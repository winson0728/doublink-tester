global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "doublink-api"
    static_configs:
      - targets: ["localhost:8090"]
    metrics_path: /metrics

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["localhost:9091"]

  - job_name: "netemu"
    static_configs:
      - targets: ["192.168.105.115:8080"]
    metrics_path: /health
