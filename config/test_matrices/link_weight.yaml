matrix:
  - id: "bonding_clean_tcp"
    mode: bonding
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "duplicate_clean_tcp"
    mode: duplicate
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "realtime_clean_tcp"
    mode: real_time
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "bonding_loss_http"
    mode: bonding
    network_condition: moderate_loss
    traffic: http_load
    assertions:
      min_success_rate: 0.90

  - id: "duplicate_loss_http"
    mode: duplicate
    network_condition: moderate_loss
    traffic: http_load
    assertions:
      min_success_rate: 0.90
