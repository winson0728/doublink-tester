matrix:
  - id: "bonding_clean_tcp"
    mode: bonding
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "duplicate_clean_tcp"
    mode: duplicate
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "realtime_clean_tcp"
    mode: real_time
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "bonding_symmetric_loss_http"
    mode: bonding
    network_condition: symmetric_loss
    traffic: http_load
    assertions:
      min_success_rate: 0.90

  - id: "duplicate_symmetric_loss_http"
    mode: duplicate
    network_condition: symmetric_loss
    traffic: http_load
    assertions:
      min_success_rate: 0.90

  - id: "bonding_5g_degraded_tcp"
    mode: bonding
    network_condition: 5g_degraded
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0

  - id: "bonding_wifi_degraded_tcp"
    mode: bonding
    network_condition: wifi_degraded
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0
