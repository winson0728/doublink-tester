matrix:
  - id: "realtime_to_bonding_clean_tcp"
    from_mode: real_time
    to_mode: bonding
    network_condition: clean_controlled
    traffic: tcp_throughput
    assertions:
      max_traffic_interruption_s: 2.0
      min_throughput_recovery_pct: 80

  - id: "bonding_to_duplicate_symm_loss_http"
    from_mode: bonding
    to_mode: duplicate
    network_condition: symmetric_mild_loss
    traffic: http_load
    assertions:
      max_traffic_interruption_s: 5.0
      min_throughput_recovery_pct: 50
      min_success_rate: 0.95

  - id: "duplicate_to_realtime_symm_latency_tcp"
    from_mode: duplicate
    to_mode: real_time
    network_condition: symmetric_mild_latency
    traffic: tcp_throughput
    assertions:
      max_traffic_interruption_s: 5.0
      min_throughput_recovery_pct: 50

  - id: "realtime_to_duplicate_congested_udp"
    from_mode: real_time
    to_mode: duplicate
    network_condition: congested_recoverable
    traffic: udp_voip
    assertions:
      max_traffic_interruption_s: 3.0
      min_throughput_recovery_pct: 40
      min_success_rate: 0.90

  - id: "bonding_to_realtime_5g_intermittent_sip"
    from_mode: bonding
    to_mode: real_time
    network_condition: 5g_intermittent_visible
    traffic: sip_calls
    assertions:
      max_traffic_interruption_s: 5.0
      min_success_rate: 0.85

  - id: "bonding_to_duplicate_5g_degraded_tcp"
    from_mode: bonding
    to_mode: duplicate
    network_condition: 5g_degraded_moderate
    traffic: tcp_throughput
    assertions:
      max_traffic_interruption_s: 5.0
      min_throughput_recovery_pct: 70
