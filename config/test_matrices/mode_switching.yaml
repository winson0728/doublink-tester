matrix:
  - id: "realtime_to_bonding_clean_tcp"
    from_mode: real_time
    to_mode: bonding
    network_condition: clean
    traffic: tcp_throughput
    assertions:
      max_traffic_interruption_s: 2.0
      min_throughput_recovery_pct: 90

  - id: "bonding_to_duplicate_loss_http"
    from_mode: bonding
    to_mode: duplicate
    network_condition: moderate_loss
    traffic: http_load
    assertions:
      max_traffic_interruption_s: 5.0
      min_success_rate: 0.95

  - id: "duplicate_to_realtime_latency_tcp"
    from_mode: duplicate
    to_mode: real_time
    network_condition: high_latency
    traffic: tcp_throughput
    assertions:
      max_traffic_interruption_s: 5.0
      min_throughput_recovery_pct: 80

  - id: "realtime_to_duplicate_congested_udp"
    from_mode: real_time
    to_mode: duplicate
    network_condition: congested
    traffic: udp_voip
    assertions:
      max_traffic_interruption_s: 3.0
      min_success_rate: 0.90

  - id: "bonding_to_realtime_disconnect_sip"
    from_mode: bonding
    to_mode: real_time
    network_condition: intermittent_disconnect
    traffic: sip_calls
    assertions:
      max_traffic_interruption_s: 5.0
      min_success_rate: 0.85
