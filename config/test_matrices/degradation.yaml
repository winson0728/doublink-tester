matrix:
  - id: "loss_bonding_tcp"
    mode: bonding
    network_condition: moderate_loss
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0
      max_loss_pct: 50.0

  - id: "loss_duplicate_tcp"
    mode: duplicate
    network_condition: moderate_loss
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 1.0
      max_loss_pct: 50.0

  - id: "latency_realtime_http"
    mode: real_time
    network_condition: high_latency
    traffic: http_load
    assertions:
      min_success_rate: 0.90
      max_latency_p95_ms: 2000

  - id: "latency_bonding_http"
    mode: bonding
    network_condition: high_latency
    traffic: http_load
    assertions:
      min_success_rate: 0.90
      max_latency_p95_ms: 2000

  - id: "congested_bonding_tcp"
    mode: bonding
    network_condition: congested
    traffic: tcp_throughput
    assertions:
      min_throughput_mbps: 0.1
      max_loss_pct: 80.0

  - id: "disconnect_realtime_sip"
    mode: real_time
    network_condition: intermittent_disconnect
    traffic: sip_calls
    assertions:
      min_success_rate: 0.80

  - id: "wifi_interference_bonding_udp"
    mode: bonding
    network_condition: wifi_interference
    traffic: udp_voip
    assertions:
      min_success_rate: 0.80
      max_jitter_ms: 100
